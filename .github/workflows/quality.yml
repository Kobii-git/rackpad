name: quality

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate GitHub Actions workflows
        run: |
          curl -fsSLO https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint_1.7.12_linux_amd64.tar.gz" | sha256sum --check
          tar -xzf actionlint_1.7.12_linux_amd64.tar.gz actionlint
          ./actionlint

      - name: Install browser test runtime
        run: npx playwright install --with-deps chromium

      - name: Validate translations
        run: npm run check:i18n

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:server && npm run test:client

      - name: Build
        run: npm run build

      - name: Check bundle budget
        run: npm run check:bundle

      - name: Check shell scripts
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Check PowerShell scripts
        shell: pwsh
        run: |
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
            if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }
          }

      - name: Browser and accessibility tests
        run: npm run test:e2e
